# === Cloudflare Workers config (used by Workers Builds via `wrangler deploy -c wrangler.workers.toml`) ===
# Vite SPA — uses the "assets-only Worker" pattern (no `main`, wrangler 4+ serves
# the assets directory directly). not_found_handling = "single-page-application"
# rewrites unknown routes to index.html for client-side routing.
name = "template-react-vite"
compatibility_date = "2024-09-23"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[vars]
ENVIRONMENT = "production"
