# Configuration for SonarCloud Automatic Analysis (autoscan).
# CI-based analyses use sonar-project.properties; autoscan reads this file.
# Keep these two files in sync.

sonar.organization=shipfast-syndicate
# Replace with your actual project key: ShipFast-Syndicate_<repo-name>
sonar.projectKey=ShipFast-Syndicate_REPLACE_ME
sonar.projectName=REPLACE_ME

sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,.vercel/**,.next/**,.svelte-kit/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.config.*
