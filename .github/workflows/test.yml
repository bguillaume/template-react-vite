name: Tests

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ShipFast-Syndicate/.github/.github/workflows/reusable-test.yml@v0.1.2
    with:
      test-command: "pnpm test:run"

  build:
    uses: ShipFast-Syndicate/.github/.github/workflows/reusable-build.yml@v0.1.2
    with:
      build-matrix: '[{"target":"default","command":"pnpm build","env":"","allow-failure":false}]'
